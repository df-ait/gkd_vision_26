# enemy_color: "red"
enemy_color: "blue"

#####-----神经网络参数-----#####
yolo_name: yolov5
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml
device: GPU
min_confidence: 0.8
use_traditional: true

#####-----ROI-----#####
roi: 
  x: 420
  y: 50
  width: 600
  height: 600

use_roi: false

#####-----传统方法参数-----#####
threshold: 150
max_angle_error: 45 # degree
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25 # degree

#####-----tracker参数-----#####
min_detect_count: 1
max_temp_lost_count: 15
outpost_max_temp_lost_count: 75
process_v1: 120
process_v2: 100
outpost_process_v1: 10
outpost_process_v2: 0.1

#####-----aimer参数-----#####
yaw_offset: 0 # degree close 0.5  far 
pitch_offset: -0.2 # degree close -0.5  far
comming_angle: 55.5 # degree
leaving_angle: 14 # degree 20
decision_speed: 7 # rad/s
high_speed_delay_time: 0.05 # s 0.035
low_speed_delay_time: 0.02 # s planner use this value 0.01

#####-----shooter参数-----#####
first_tolerance: 3 # 近距离射击容差，degree
second_tolerance: 2 # 远距离射击容差，degree
judge_distance: 2 #距离判断阈值
auto_fire: true # 是否由自瞄控制射击

camera_name: "hikrobot"
exposure_ms: 2
gain: 16.9
vid_pid: "2bdf:0001"

#  1  0  0
#  0  1  0
#  0  0  1

R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]

# 重投影误差: 0.0877px
camera_matrix: [3574.6077589579377, 0, 738.75421070048003, 0, 3575.0512483596581, 591.98019144155694, 0, 0, 1]
distort_coeffs: [-0.0072020846467077569, 0.015885370380101307, 0.0022391178761444956, 0.0012999871005454392, 0]

R_camera2gimbal: [0, 0, 1, -1, 0, 0, 0, -1, 0]
t_camera2gimbal: [0.09256571583, 0, 0.04637]

#####-----cboard参数-----#####
quaternion_canid: 0x100
bullet_speed_canid: 0x101
send_canid: 0xff
can_interface: "can0"

#####-----gimbal参数-----#####
com_port: "/dev/gimbal"
yaw_kp: 0
yaw_kd: 0
pitch_kp: 0
pitch_kd: 0

#####-----planner-----#####
fire_thresh: 0.0013 #0.0015

max_yaw_acc: 0.5
Q_yaw: [1, 1]
R_yaw: [1e8]

max_pitch_acc: 100
Q_pitch: [9e6, 0]
R_pitch: [1]

#####-----buff_detector参数-----#####
model: "assets/yolo11_buff_int8.xml"

#####-----buff_aimer参数-----#####
fire_gap_time: 0.700   # s
predict_time: 0.120     # s
